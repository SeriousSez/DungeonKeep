<main class="page-stack">
    <section class="panel page-intro">
        <div class="page-intro-body">
            <div>
                <p class="eyebrow">Character management</p>
                <h1>Characters</h1>
                <p>Track readiness, level progression, and player-facing notes for the active party.</p>
            </div>
            <a routerLink="/characters/new" class="create-link">+ New Character</a>
        </div>
    </section>

    <section class="page-stats">
        <div class="stat-card">
            <p class="stat-label">Total Characters</p>
            <p class="stat-value">{{ store.characterCount() }}</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Ready to Play</p>
            <p class="stat-value">{{ store.readyCharacterCount() }}</p>
        </div>
    </section>

    <app-party-roster [selectedParty]="ownedCharacters()" [eyebrow]="'Character vault'" [title]="'Your Characters'" [countLabel]="'total'" [emptyTitle]="'No characters created yet'" [emptyMessage]="'Create a new character or choose a premade to start building your roster.'"
        [emptyActionLabel]="'Create Character'" [emptyActionLink]="'/characters/new'" (statusCycled)="store.cycleStatus($event)" (characterPromoted)="store.promoteCharacter($event)" (requestDelete)="handleRequestDelete($event)" />

    <app-confirm-modal [open]="!!confirmDeleteId" title="Delete Character?" message="Are you sure you want to delete this character? This action cannot be undone." confirmText="Delete" cancelText="Cancel" (confirmed)="handleDeleteConfirmed()"
        (cancelled)="handleDeleteCancelled()"></app-confirm-modal>
</main>
