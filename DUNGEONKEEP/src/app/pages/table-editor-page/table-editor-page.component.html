<main class="page-stack">
    <section class="panel page-intro">
        <div class="page-intro-header">
            <div>
                <p class="eyebrow">{{ libraryMode() ? 'Reusable Tables' : 'Campaign Tables' }}</p>
                <h1>{{ isNewTable() ? 'Create Table' : 'Edit Table' }}</h1>
                <p>Set a title, add a short description, and enter one result per line.</p>
            </div>
            @if (libraryMode()) {
            <a class="ghost-button" [routerLink]="['/tables']">Back to Library</a>
            } @else {
            <a class="ghost-button" [routerLink]="['/campaigns', campaignId(), 'tables']">Back to Tables</a>
            }
        </div>
    </section>

    @if (feedback()) {
    <section class="panel feedback-panel">
        <p>{{ feedback() }}</p>
    </section>
    }

    <section class="panel editor-panel">
        <div class="editor-fields">
            <label class="editor-field">
                <span>Title</span>
                <input type="text" [value]="title()" (input)="updateTitle($any($event.target).value)" placeholder="Ex: Tavern Rumors" />
            </label>

            <label class="editor-field">
                <span>Description</span>
                <textarea rows="3" [value]="description()" (input)="updateDescription($any($event.target).value)" placeholder="What is this table used for?"></textarea>
            </label>

            <label class="editor-field">
                <span>Entries</span>
                <textarea rows="12" [value]="entriesText()" (input)="updateEntries($any($event.target).value)" placeholder="One result per line"></textarea>
                <small>Each line becomes a possible rolled outcome.</small>
            </label>
        </div>

        <div class="editor-actions">
            <button type="button" class="primary-button" (click)="saveTable()">Save Table</button>
        </div>
    </section>
</main>
