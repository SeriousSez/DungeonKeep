<div class="modal-backdrop" *ngIf="open">
    <div class="modal-card">
        <h2>{{ title }}</h2>
        <p>{{ message }}</p>
        <div class="modal-actions">
            <button class="ghost-button" (click)="cancel()">{{ cancelText }}</button>
            <button class="danger-button" (click)="confirm()">{{ confirmText }}</button>
        </div>
    </div>
</div>
