@if (!isInitialized()) {
<main class="loading-state panel">
    <p class="eyebrow">Loading</p>
    <h1>Restoring your table access...</h1>
</main>
} @else if (!currentUser()) {
<main class="auth-shell-wrap">
    <router-outlet />
</main>
} @else {
<header class="topbar">
    <div class="topbar-inner">

        <a class="brand-link" routerLink="/dashboard" (click)="closeDropdown(); closeMobileNav()">
            <div class="brand-mark">DK</div>
            <span class="brand-name">DungeonKeep</span>
        </a>

        <nav id="primary-nav" class="primary-nav" [class.is-open]="mobileNavOpen()">

            <div class="nav-group" [class.is-open]="openDropdown() === 'campaigns'">
                <button class="nav-group-btn" type="button" (click)="toggleDropdown('campaigns')">
                    Campaigns
                    <i class="fa-duotone fa-thin fa-chevron-down nav-chevron"></i>
                </button>
                <div class="nav-dropdown">
                    <p class="nav-dropdown-section">Manage</p>
                    <a routerLink="/campaigns" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="is-active" (click)="closeDropdown(); closeMobileNav()">
                        <i class="fa-duotone fa-thin fa-scroll"></i>
                        My Campaigns
                    </a>
                    <a routerLink="/campaigns/new" routerLinkActive="is-active" (click)="closeDropdown(); closeMobileNav()">
                        <i class="fa-duotone fa-thin fa-circle-plus"></i>
                        New Campaign
                    </a>
                    <div class="nav-dropdown-rule"></div>
                    <p class="nav-dropdown-section">Prepare</p>
                    <a routerLink="/sessions" routerLinkActive="is-active" (click)="closeDropdown(); closeMobileNav()">
                        <i class="fa-duotone fa-thin fa-book-open-cover"></i>
                        Session Prep
                    </a>
                </div>
            </div>

            <div class="nav-group" [class.is-open]="openDropdown() === 'characters'">
                <button class="nav-group-btn" type="button" (click)="toggleDropdown('characters')">
                    Characters
                    <i class="fa-duotone fa-thin fa-chevron-down nav-chevron"></i>
                </button>
                <div class="nav-dropdown">
                    <p class="nav-dropdown-section">Manage</p>
                    <a routerLink="/characters" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="is-active" (click)="closeDropdown(); closeMobileNav()">
                        <i class="fa-duotone fa-thin fa-users"></i>
                        My Characters
                    </a>
                    <a routerLink="/characters/new" routerLinkActive="is-active" (click)="closeDropdown(); closeMobileNav()">
                        <i class="fa-duotone fa-thin fa-user-plus"></i>
                        New Character
                    </a>
                </div>
            </div>

            <a class="nav-direct" routerLink="/sessions" routerLinkActive="is-active" (click)="closeMobileNav(); closeDropdown()">
                Session Prep
            </a>

            <div class="nav-mobile-footer">
                <span class="user-pill">{{ currentUser()?.displayName }}</span>
                <button type="button" class="logout-btn-plain" (click)="logout()">Log Out</button>
            </div>
        </nav>

        <div class="topbar-spacer"></div>

        <div class="topbar-actions">
            <span class="user-pill">{{ currentUser()?.displayName }}</span>
            <button type="button" class="logout-icon-btn" (click)="logout()" aria-label="Log out">
                <i class="fa-duotone fa-thin fa-right-from-bracket"></i>
            </button>
        </div>

        <button type="button" class="hamburger-btn" [attr.aria-expanded]="mobileNavOpen()" aria-controls="primary-nav" aria-label="Toggle navigation" (click)="toggleMobileNav()">
            <span></span>
            <span></span>
            <span></span>
        </button>

    </div>
</header>

<app-breadcrumb />

<main class="shell">
    <router-outlet />
</main>

<app-dnd-chat-widget />
}
