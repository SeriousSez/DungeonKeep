<button type="button" class="chat-launcher" aria-label="Open D&D chat" (click)="toggleOpen()">
    <i class="fa-duotone fa-thin fa-messages"></i>
</button>

@if (isOpen()) {
<section class="chat-panel panel" aria-label="D&D assistant chat panel">
    <header class="chat-header">
        <div>
            <p class="chat-eyebrow">OpenAI Assistant</p>
            <h3>D&D Rules Chat</h3>
        </div>
        <button type="button" class="close-btn" aria-label="Close chat" (click)="toggleOpen()">
            <i class="fa-duotone fa-thin fa-xmark"></i>
        </button>
    </header>

    <p class="key-state ok">Server-backed chat enabled.</p>

    <div class="messages">
        @for (message of messages(); track $index) {
        <article class="message" [class.user]="message.role === 'user'" [class.assistant]="message.role === 'assistant'">
            <p>{{ message.content }}</p>
        </article>
        }
    </div>

    @if (error()) {
    <p class="error-text">{{ error() }}</p>
    }

    <form class="composer" (ngSubmit)="sendMessage()">
        <textarea [ngModel]="draft()" (ngModelChange)="draft.set($event)" name="chatPrompt" rows="2" placeholder="Ask about D&D rules, classes, spells..."></textarea>
        <button type="submit" [disabled]="isLoading()">
            {{ isLoading() ? 'Thinking...' : 'Ask' }}
        </button>
    </form>
</section>
}
