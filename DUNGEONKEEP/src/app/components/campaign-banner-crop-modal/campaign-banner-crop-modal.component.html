@if (open()) {
<div class="banner-crop-backdrop" (click)="close()">
    <section class="banner-crop-modal panel" role="dialog" aria-modal="true" [attr.aria-label]="'Crop banner for ' + campaignName()" (click)="$event.stopPropagation()">
        <header class="banner-crop-header">
            <div>
                <p class="banner-crop-eyebrow">Banner Upload</p>
                <h2>Crop Banner</h2>
                <p>Drag and zoom the image to frame the perfect banner for <strong>{{ campaignName() }}</strong>.</p>
            </div>
            <button type="button" class="ghost-button" (click)="close()">Cancel</button>
        </header>

        <div class="banner-crop-body">
            <div class="banner-crop-stage">
                <div class="banner-crop-viewport" (pointerdown)="handleViewportPointerDown($event)" (pointermove)="handleViewportPointerMove($event)" (pointerup)="handleViewportPointerUp($event)" (pointercancel)="handleViewportPointerUp($event)">
                    @if (imageReady()) {
                    <img class="banner-crop-image" [src]="imageUrl()" [alt]="campaignName()" [style.width.px]="naturalWidth()" [style.height.px]="naturalHeight()" [style.transform]="previewTransform()" draggable="false" />
                    }
                    <div class="banner-crop-frame"></div>
                </div>
            </div>

            <div class="banner-crop-controls">
                <label class="banner-crop-label" for="banner-crop-zoom">Zoom</label>
                <input id="banner-crop-zoom" class="banner-crop-range" type="range" min="0.4" max="4" step="0.01" [value]="zoom()" (input)="updateZoom($any($event.target).value)" />
                <div class="banner-crop-scale-row">
                    <span>Fit</span>
                    <strong>{{ zoom().toFixed(2) }}x</strong>
                    <span>Close</span>
                </div>
                <p class="banner-crop-help">The banner is saved at 1280 × 400 px and displayed as a wide strip across the top of your campaign.</p>
            </div>
        </div>

        <footer class="banner-crop-actions">
            <button type="button" class="ghost-button" (click)="close()">Cancel</button>
            <button type="button" class="primary-button" [disabled]="!imageReady()" (click)="applyCrop()">Use Banner</button>
        </footer>
    </section>
</div>
}
