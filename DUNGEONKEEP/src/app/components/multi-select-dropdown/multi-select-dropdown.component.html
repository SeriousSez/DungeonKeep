<div class="msd-host" [class.msd-open]="isOpen()" [class.msd-open-up]="opensUpward()" [class.msd-open-align-end]="panelAlignment() === 'end'" [class.msd-open-align-start]="panelAlignment() === 'start'">
    <button type="button" class="msd-trigger" [attr.aria-expanded]="isOpen()" aria-haspopup="listbox" (click)="toggleOpen()">
        <span class="msd-trigger-copy">
            <span class="msd-trigger-label">
                {{ triggerLabel() }}
            </span>
            @if (selectedCountLabel()) {
            <span class="msd-trigger-meta">{{ selectedCountLabel() }}</span>
            }
        </span>
        <i class="fa-duotone fa-thin fa-chevron-down msd-chevron"></i>
    </button>

    @if (isOpen()) {
    <div class="msd-panel" role="listbox" [attr.aria-multiselectable]="isSingleSelect() ? null : 'true'" [style.max-height.px]="panelMaxHeight()" [style.max-width.px]="getPanelMaxWidth()">
        <div class="msd-panel-inner" [style.max-height.px]="panelMaxHeight()">
            @for (group of groups(); track group.label) {
            <div class="msd-group">
                @if (group.label) {
                <p class="msd-group-label">{{ group.label }}</p>
                }
                @for (option of group.options; track optionValue(option)) {
                <label class="msd-option" [class.msd-option--checked]="isSelected(option)" [class.msd-option--disabled]="isOptionDisabled(option)" [class.msd-option--single]="isSingleSelect()" role="option" [attr.aria-selected]="isSelected(option)">
                    <input type="checkbox" [checked]="isSelected(option)" [disabled]="isOptionDisabled(option)" (change)="onToggle(optionValue(option), $any($event.target).checked)" class="msd-checkbox" [class.msd-checkbox--hidden]="isSingleSelect()">
                    <span class="msd-option-label">{{ optionLabel(option) }}</span>
                    @if (isSelected(option)) {
                    <i class="fa-duotone fa-thin fa-check msd-check-icon"></i>
                    }
                </label>
                }
            </div>
            }
        </div>
    </div>
    }
</div>
