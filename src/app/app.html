<header class="topbar panel">
    <div class="topbar-main-row">
        <div class="brand-block">
            <div class="brand-mark">DK</div>
            <div>
                <p class="eyebrow">Tabletop command center</p>
                <h1>{{ store.title() }}</h1>
            </div>
        </div>

        <button type="button" class="hamburger-btn" [attr.aria-expanded]="mobileNavOpen()" aria-controls="primary-nav" aria-label="Toggle navigation" (click)="toggleMobileNav()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <nav id="primary-nav" class="nav-links" [class.is-open]="mobileNavOpen()">
        <a routerLink="/dashboard" routerLinkActive="is-active" (click)="closeMobileNav()">Dashboard</a>
        <a routerLink="/campaigns" routerLinkActive="is-active" (click)="closeMobileNav()">Campaigns</a>
        <a routerLink="/characters" routerLinkActive="is-active" (click)="closeMobileNav()">Characters</a>
        <a routerLink="/campaigns/new" routerLinkActive="is-active" (click)="closeMobileNav()">New Campaign</a>
        <a routerLink="/characters/new" routerLinkActive="is-active" (click)="closeMobileNav()">New Character</a>
        <a routerLink="/sessions" routerLinkActive="is-active" (click)="closeMobileNav()">Session Prep</a>
    </nav>
</header>

<app-breadcrumb />

<main class="shell">
    <router-outlet />
</main>
