<main class="page-stack">
    <section class="panel page-intro">
        <p class="eyebrow">Session planning</p>
        <h1>Session Prep</h1>
        <p>Pick a campaign, review upcoming sessions, and clear completed threads.</p>
    </section>

    <section class="page-stats">
        <div class="stat-card">
            <p class="stat-label">Total Sessions</p>
            <p class="stat-value">{{ store.sessionCount() }}</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Open Threads</p>
            <p class="stat-value">{{ store.openThreadCount() }}</p>
        </div>
    </section>

    <section class="workspace-grid">
        <app-campaign-list [campaigns]="store.campaigns()" [selectedCampaignId]="store.selectedCampaignId()" [openThreadCount]="store.openThreadCount()" (campaignSelected)="store.selectCampaign($event)" />

        <app-campaign-detail [selectedCampaign]="store.selectedCampaign()" (threadArchived)="store.archiveThread($event)" />
    </section>
</main>
