<main class="page-stack">
    <section class="panel page-intro">
        <p class="eyebrow">Campaign management</p>
        <h1>Campaigns</h1>
        <p>Build campaign arcs, track threads, and archive completed story beats.</p>
    </section>

    <section class="page-stats">
        <div class="stat-card">
            <p class="stat-label">Total Campaigns</p>
            <p class="stat-value">{{ store.campaignCount() }}</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Open Threads</p>
            <p class="stat-value">{{ store.openThreadCount() }}</p>
        </div>
    </section>

    <app-campaign-board [campaigns]="store.campaigns()" [selectedCampaignId]="store.selectedCampaignId()" [selectedCampaign]="store.selectedCampaign()" [openThreadCount]="store.openThreadCount()" (campaignSelected)="store.selectCampaign($event)" (threadArchived)="store.archiveThread($event)" />

    <a routerLink="/campaigns/new" class="create-link">+ New Campaign</a>
</main>
