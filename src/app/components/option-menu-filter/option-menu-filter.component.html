<div class="class-sort-popover">
    <button type="button" class="class-sort-trigger" [attr.aria-label]="ariaLabel()" [attr.title]="menuLabel()" [attr.aria-expanded]="menuOpen()" (click)="toggleMenu()">
        <i class="fa-duotone fa-thin fa-bars-filter" aria-hidden="true"></i>
    </button>
    @if (menuOpen()) {
    <div class="class-sort-popover-panel" role="menu" [attr.aria-label]="menuLabel()">
        @for (option of options(); track option.value) {
        <button type="button" class="class-sort-option" [class.active]="selectedValue() === option.value" role="menuitemradio" [attr.aria-checked]="selectedValue() === option.value" (click)="pickOption(option.value)">
            <span>{{ option.label }}</span>
            @if (selectedValue() === option.value) {
            <i class="fa-duotone fa-thin fa-bars-filter" aria-hidden="true"></i>
            }
        </button>
        }
    </div>
    }
</div>
