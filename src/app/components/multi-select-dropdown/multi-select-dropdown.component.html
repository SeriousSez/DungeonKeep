<div class="msd-host" [class.msd-open]="isOpen()" [class.msd-open-up]="opensUpward()">
    <button type="button" class="msd-trigger" [attr.aria-expanded]="isOpen()" aria-haspopup="listbox" (click)="toggleOpen()">
        <span class="msd-trigger-copy">
            <span class="msd-trigger-label">
                @if (value().length === 0) {
                {{ placeholder() }}
                } @else {
                {{ value().join(', ') }}
                }
            </span>
            @if (selectedCountLabel()) {
            <span class="msd-trigger-meta">{{ selectedCountLabel() }}</span>
            }
        </span>
        <i class="fa-duotone fa-thin fa-chevron-down msd-chevron"></i>
    </button>

    @if (isOpen()) {
    <div class="msd-panel" role="listbox" [attr.aria-multiselectable]="true" [style.max-height.px]="panelMaxHeight()">
        <div class="msd-panel-inner" [style.max-height.px]="panelMaxHeight()">
            @for (group of groups(); track group.label) {
            <div class="msd-group">
                @if (group.label) {
                <p class="msd-group-label">{{ group.label }}</p>
                }
                @for (option of group.options; track option) {
                <label class="msd-option" [class.msd-option--checked]="isSelected(option)" [class.msd-option--disabled]="isOptionDisabled(option)" role="option" [attr.aria-selected]="isSelected(option)">
                    <input type="checkbox" [checked]="isSelected(option)" [disabled]="isOptionDisabled(option)" (change)="onToggle(option, $any($event.target).checked)" class="msd-checkbox">
                    <span class="msd-option-label">{{ option }}</span>
                    @if (isSelected(option)) {
                    <i class="fa-duotone fa-thin fa-check msd-check-icon"></i>
                    }
                </label>
                }
            </div>
            }
        </div>
    </div>
    }
</div>
